<!DOCTYPE html>
<html>
<head>
<title>Realistic Calculator</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#2c2c2c;
font-family:Arial;
}

.calculator{
background:#000;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#display{
width:100%;
height:60px;
font-size:28px;
text-align:right;
margin-bottom:15px;
border:none;
outline:none;
padding:10px;
background:#222;
color:white;
border-radius:8px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,70px);
grid-gap:10px;
}

button{
height:60px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

.number{
background:#333;
color:white;
}

.operator{
background:#ff9500;
color:white;
}

.equal{
background:#ff9500;
color:white;
grid-column:span 2;
}

.clear{
background:#a5a5a5;
}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="add('%')">%</button>
<button class="operator" onclick="add('/')">÷</button>
<button class="operator" onclick="add('*')">×</button>

<button class="number" onclick="add('7')">7</button>
<button class="number" onclick="add('8')">8</button>
<button class="number" onclick="add('9')">9</button>
<button class="operator" onclick="add('-')">−</button>

<button class="number" onclick="add('4')">4</button>
<button class="number" onclick="add('5')">5</button>
<button class="number" onclick="add('6')">6</button>
<button class="operator" onclick="add('+')">+</button>

<button class="number" onclick="add('1')">1</button>
<button class="number" onclick="add('2')">2</button>
<button class="number" onclick="add('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button class="number" onclick="add('0')">0</button>
<button class="number" onclick="add('.')">.</button>

</div>

</div>

<script>

function add(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function calculate(){
let result=document.getElementById("display").value;
try{
document.getElementById("display").value=eval(result);
}
catch{
document.getElementById("display").value="Error";
}
}

</script>

</body>
</html>
